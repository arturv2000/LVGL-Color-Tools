name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: vscode-lvgl-color-tools-vsix
          path: '*.vsix'
